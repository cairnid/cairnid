name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: Candidate release tag to rehearse without creating a tag or GitHub Release.
        required: true
        type: string
        default: v0.1.0-rc.1

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_CYCLONEDX_VERSION: 0.5.9
  LINUX_TARGET: x86_64-unknown-linux-gnu
  WINDOWS_TARGET: x86_64-pc-windows-msvc

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      source_commit: ${{ steps.tagged-source.outputs.commit || steps.rehearsal-source.outputs.commit }}
      ci_run_url: ${{ steps.tagged-source.outputs.ci_run_url }}
    steps:
      - name: Validate release tag
        id: release
        shell: bash
        env:
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${CANDIDATE_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "::error::release tags must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N"
            exit 1
          fi

          prerelease="false"
          if [[ "$tag" =~ -rc\.[0-9]+$ ]]; then
            prerelease="true"
          fi

          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert release package versions
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          metadata_path="${RUNNER_TEMP}/release-cargo-metadata.json"
          cargo metadata --locked --no-deps --format-version 1 > "$metadata_path"

          METADATA_PATH="$metadata_path" python3 - <<'PY'
          import json
          import os
          import sys

          expected_version = os.environ["RELEASE_VERSION"]
          release_tag = os.environ["RELEASE_TAG"]
          metadata_path = os.environ["METADATA_PATH"]
          required_packages = {
              "cairnid": "apps/cli/Cargo.toml",
              "cairnid-mcp": "apps/mcp/Cargo.toml",
          }

          with open(metadata_path, encoding="utf-8") as handle:
              metadata = json.load(handle)

          packages = {
              package.get("name"): package
              for package in metadata.get("packages", [])
              if package.get("name") in required_packages
          }
          failures = []
          for name, manifest in required_packages.items():
              package = packages.get(name)
              if package is None:
                  failures.append(
                      f"{manifest}: cargo metadata did not include release package {name}"
                  )
                  continue
              actual_version = package.get("version")
              if actual_version != expected_version:
                  failures.append(
                      f"{manifest}: release package {name} version mismatch for tag {release_tag}: "
                      f"expected {expected_version}, actual {actual_version}"
                  )

          if failures:
              for failure in failures:
                  print(f"::error::{failure}", file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Verify tagged source commit
        id: tagged-source
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          main_commit="$(git rev-parse "refs/remotes/origin/main^{commit}")"

          if ! git merge-base --is-ancestor "$tag_commit" "$main_commit"; then
            echo "::error::release tag ${RELEASE_TAG} (${tag_commit}) is not reachable from origin/main (${main_commit})"
            exit 1
          fi

          ci_runs="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow CI \
              --branch main \
              --commit "$tag_commit" \
              --event push \
              --status success \
              --limit 20 \
              --json databaseId,status,conclusion,event,headSha,url,workflowName
          )"

          CI_RUNS_JSON="$ci_runs" TAG_COMMIT="$tag_commit" python3 - <<'PY'
          import json
          import os
          import sys

          tag_commit = os.environ["TAG_COMMIT"]
          runs = json.loads(os.environ["CI_RUNS_JSON"])
          matches = [
              run
              for run in runs
              if run.get("headSha") == tag_commit
              and run.get("status") == "completed"
              and run.get("conclusion") == "success"
              and run.get("event") == "push"
              and run.get("workflowName") == "CI"
          ]

          if not matches:
              print(
                  f"::error::release tag commit {tag_commit} does not have a successful completed CI run on main",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"commit={tag_commit}", file=output)
              print(f"ci_run_url={matches[0]['url']}", file=output)
          PY

      - name: Use workflow source commit for rehearsal
        id: rehearsal-source
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            binary_ext: ''
            archive_ext: tar.gz
          - label: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            binary_ext: .exe
            archive_ext: zip
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      TARGET: ${{ matrix.target }}
      BINARY_EXT: ${{ matrix.binary_ext }}
      ARCHIVE_EXT: ${{ matrix.archive_ext }}
      CLI_BINARY: target/${{ matrix.target }}/release/cairnid${{ matrix.binary_ext }}
      CLI_AUX_DIR: target/${{ matrix.target }}/release/cairnid-operator-files
      MCP_BINARY: target/${{ matrix.target }}/release/cairnid-mcp${{ matrix.binary_ext }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 35
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail

          apt_with_retry() {
            local description="$1"
            shift
            local status=0
            for attempt in 1 2 3; do
              echo "${description} (attempt ${attempt}/3)"
              if sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s 300s "$@"; then
                return 0
              fi
              status=$?
              if [ "$attempt" -eq 3 ]; then
                echo "::error::${description} failed after 3 attempts"
                return "$status"
              fi
              sleep "$((attempt * 10))"
            done
          }

          apt_with_retry "apt-get update" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 update
          apt_with_retry "apt-get install" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 install -y --no-install-recommends cmake nasm pkg-config libssl-dev

      - name: Show Rust version
        shell: bash
        run: rustc --version && cargo --version

      - name: Ensure Rust target is installed
        shell: bash
        run: rustup target add "$TARGET"

      - name: Build release CLI and MCP
        shell: bash
        run: cargo build --release --locked --target "$TARGET" -p cairnid -p cairnid-mcp

      - name: Smoke release CLI
        shell: python
        env:
          CAIRN_ENV: production
          DATABASE_URL: postgres://CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE@example.invalid/cairn_identity
          CAIRN_ISSUER: https://id.example.com
          CAIRN_PUBLIC_WEB_ORIGIN: https://app.example.com
          CAIRN_BOOTSTRAP_SETUP_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_EMAIL_PROVIDER: command
          CAIRN_EMAIL_COMMAND_PATH: /usr/local/bin/cairn-send-email
          CAIRN_CONFORMANCE_ALIAS: cairn-release
          CAIRN_CONFORMANCE_CLIENT_ID: client-one
          CAIRN_CONFORMANCE_CLIENT_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_CONFORMANCE_CLIENT2_ID: client-two
          CAIRN_CONFORMANCE_CLIENT2_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_CONFORMANCE_SUITE_BASE_URL: https://www.certification.openid.net/
          CAIRN_SCIM_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_SCIM_SECONDARY_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_SCIM_REJECTED_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_BREAK_GLASS_CONFIRM: grant-admin-owner
          CAIRN_OLD_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_NEW_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
        run: |
          import json
          import os
          import subprocess
          import tempfile
          from pathlib import Path

          SENTINEL = "CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE"
          expected_version = os.environ["RELEASE_VERSION"]
          cli = Path(os.environ["CLI_BINARY"]).resolve()
          outputs = []

          def run_cli(*args, expect_success=True):
              result = subprocess.run(
                  [str(cli), *args],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              outputs.extend([result.stdout, result.stderr])
              if expect_success and result.returncode != 0:
                  raise SystemExit(
                      f"{' '.join(args)} failed with exit code {result.returncode}: {result.stderr}"
                  )
              if not expect_success and result.returncode == 0:
                  raise SystemExit(f"{' '.join(args)} unexpectedly succeeded")
              return result

          def assert_version_output(label, result, binary_name):
              expected_output = f"{binary_name} {expected_version}"
              actual_output = result.stdout.strip()
              if actual_output != expected_output:
                  raise SystemExit(
                      f"{label} --version mismatch: expected {expected_output!r}, "
                      f"actual output {actual_output!r}"
                  )
              if result.stderr.strip():
                  raise SystemExit(f"{label} --version wrote stderr: {result.stderr.strip()!r}")

          with tempfile.TemporaryDirectory(prefix="cairnid-release-") as root:
              evidence_dir = Path(root) / "release-evidence"
              assert_version_output("direct CLI", run_cli("--version"), "cairnid")
              run_cli("evidence", "--help")
              plan = json.loads(run_cli("evidence", "plan").stdout)
              manifest = json.loads(run_cli("evidence", "manifest").stdout)
              init = json.loads(run_cli("evidence", "init", str(evidence_dir)).stdout)
              status = json.loads(
                  run_cli("evidence", "status", str(evidence_dir), expect_success=False).stdout
              )
              check = json.loads(
                  run_cli("evidence", "check", str(evidence_dir), expect_success=False).stdout
              )

              if SENTINEL in "\n".join(outputs):
                  raise SystemExit("release CLI smoke output leaked sentinel")
              for path in evidence_dir.rglob("*"):
                  if path.is_file() and SENTINEL.encode() in path.read_bytes():
                      raise SystemExit(f"release evidence scaffold leaked sentinel in {path.name}")

          assert plan["status"] == "ready", plan
          assert plan["artifact_count"] == 24, plan
          assert plan["missing_environment"] == [], plan

          assert manifest["status"] == "ok", manifest
          assert manifest["artifact_count"] == 24, manifest

          assert init["status"] == "initialized", init
          assert init["artifact_count"] == 24, init
          assert init["files_written"] == [
              "release-evidence-manifest.json",
              "README.md",
              ".gitignore",
          ], init

          assert status["status"] == "incomplete", status
          assert status["artifact_count"] == 24, status
          assert status["missing_artifact_count"] == 24, status

          assert check["status"] == "incomplete", check
          assert len(check["artifacts"]) == 24, check
          assert check["failures"], check

      - name: Smoke release MCP stdio
        shell: python
        env:
          CAIRN_ENV: production
          DATABASE_URL: postgres://CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE@example.invalid/cairn_identity
          CAIRN_ISSUER: https://id.example.com
          CAIRN_PUBLIC_WEB_ORIGIN: https://app.example.com
          CAIRN_BOOTSTRAP_SETUP_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_EMAIL_PROVIDER: command
          CAIRN_EMAIL_COMMAND_PATH: /usr/local/bin/cairn-send-email
          CAIRN_CONFORMANCE_ALIAS: cairn-release
          CAIRN_CONFORMANCE_CLIENT_ID: client-one
          CAIRN_CONFORMANCE_CLIENT_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_CONFORMANCE_CLIENT2_ID: client-two
          CAIRN_CONFORMANCE_CLIENT2_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_CONFORMANCE_SUITE_BASE_URL: https://www.certification.openid.net/
          CAIRN_SCIM_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_SCIM_SECONDARY_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_SCIM_REJECTED_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_BREAK_GLASS_CONFIRM: grant-admin-owner
          CAIRN_OLD_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_NEW_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
        run: |
          import json
          import os
          import queue
          import subprocess
          import tempfile
          import threading
          import time

          expected_tools = [
              "cairnid.evidence_check",
              "cairnid.evidence_manifest",
              "cairnid.evidence_plan",
              "cairnid.evidence_status",
          ]

          SENTINEL = "CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE"
          expected_version = os.environ["RELEASE_VERSION"]
          cli = os.path.abspath(os.environ["CLI_BINARY"])
          binary = os.path.abspath(os.environ["MCP_BINARY"])

          def assert_no_sentinel(label, *values):
              for value in values:
                  text = value if isinstance(value, str) else json.dumps(value, sort_keys=True)
                  if SENTINEL in text:
                      raise SystemExit(f"{label} leaked sentinel")

          def safe_stderr(stderr_lines):
              text = "".join(stderr_lines)
              if SENTINEL in text:
                  return "[redacted: sentinel appeared in stderr]"
              return text

          def assert_binary_version(label, binary, binary_name):
              result = subprocess.run(
                  [binary, "--version"],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              assert_no_sentinel(label, result.stdout, result.stderr)
              if result.returncode != 0:
                  raise SystemExit(
                      f"{label} --version failed with exit code {result.returncode}: {result.stderr}"
                  )
              expected_output = f"{binary_name} {expected_version}"
              actual_output = result.stdout.strip()
              if actual_output != expected_output:
                  raise SystemExit(
                      f"{label} --version mismatch: expected {expected_output!r}, "
                      f"actual output {actual_output!r}"
                  )
              if result.stderr.strip():
                  raise SystemExit(f"{label} --version wrote stderr: {result.stderr.strip()!r}")

          def initialize_evidence_dir(root):
              evidence_dir = os.path.join(root, "release-evidence")
              result = subprocess.run(
                  [cli, "evidence", "init", evidence_dir],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              assert_no_sentinel("release evidence init output", result.stdout, result.stderr)
              if result.returncode != 0:
                  raise SystemExit(
                      f"evidence init failed with exit code {result.returncode}: {result.stderr}"
                  )
              init = json.loads(result.stdout)
              assert init["status"] == "initialized", init
              return evidence_dir

          def assert_tools_list_output_schemas(tools):
              if not isinstance(tools, list):
                  raise SystemExit(f"MCP tools/list did not return a tools array: {tools}")
              advertised_names = set()
              for tool in tools:
                  if not isinstance(tool, dict):
                      raise SystemExit(f"MCP tools/list returned a non-object tool: {tool}")
                  name = tool.get("name")
                  advertised_names.add(name)
                  schema = tool.get("outputSchema")
                  if not isinstance(schema, dict):
                      raise SystemExit(f"MCP tool {name} omitted outputSchema: {tool}")
                  if schema.get("type") != "object":
                      raise SystemExit(f"MCP tool {name} outputSchema is not an object schema: {schema}")
                  variants = schema.get("oneOf")
                  if not isinstance(variants, list) or len(variants) != 2:
                      raise SystemExit(f"MCP tool {name} outputSchema should expose success and error variants: {schema}")
                  encoded_schema = json.dumps(schema, sort_keys=True)
                  if "schema_version" not in encoded_schema:
                      raise SystemExit(f"MCP tool {name} outputSchema omits schema_version: {schema}")
              for name in expected_tools:
                  if name not in advertised_names:
                      raise SystemExit(f"MCP tools/list omitted {name}: {tools}")

          assert_binary_version("direct MCP", binary, "cairnid-mcp")

          with tempfile.TemporaryDirectory(prefix="cairnid-mcp-release-") as root:
              initialize_evidence_dir(root)
              process = subprocess.Popen(
                  [binary],
                  cwd=root,
                  env={**os.environ, "RUST_LOG": "off"},
                  stdin=subprocess.PIPE,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              responses = queue.Queue()
              observed_responses = []
              stdout_lines = []
              stderr_lines = []

              def read_stdout():
                  for line in process.stdout:
                      stdout_lines.append(line)
                      if line.strip():
                          responses.put(line)

              def read_stderr():
                  for line in process.stderr:
                      stderr_lines.append(line)

              threading.Thread(target=read_stdout, daemon=True).start()
              threading.Thread(target=read_stderr, daemon=True).start()

              def write(message):
                  if process.poll() is not None:
                      raise SystemExit(
                          f"MCP server exited before request; code={process.returncode}; "
                          f"stderr={safe_stderr(stderr_lines)}"
                      )
                  process.stdin.write(json.dumps(message) + "\n")
                  process.stdin.flush()

              def request(request_id, message):
                  write(message)
                  deadline = time.monotonic() + 10
                  while True:
                      remaining = deadline - time.monotonic()
                      if remaining <= 0:
                          raise SystemExit(
                              f"timed out waiting for MCP response {request_id}; "
                              f"stderr={safe_stderr(stderr_lines)}"
                          )
                      try:
                          line = responses.get(timeout=remaining)
                      except queue.Empty:
                          raise SystemExit(
                              f"timed out waiting for MCP response {request_id}; "
                              f"stderr={safe_stderr(stderr_lines)}"
                          ) from None
                      assert_no_sentinel("MCP stdout", line)
                      try:
                          response = json.loads(line)
                      except json.JSONDecodeError as exc:
                          raise SystemExit(
                              f"MCP wrote non-JSON stdout: {line!r}; stderr={safe_stderr(stderr_lines)}"
                          ) from exc
                      assert_no_sentinel(f"MCP response {request_id}", response)
                      observed_responses.append(response)
                      if response.get("id") != request_id:
                          raise SystemExit(
                              f"MCP response id mismatch for request {request_id}: {response}"
                          )
                      if "error" in response:
                          raise SystemExit(f"MCP response {request_id} returned error: {response}")
                      return response["result"]

              def call_tool(request_id, name, arguments):
                  return request(
                      request_id,
                      {
                          "jsonrpc": "2.0",
                          "id": request_id,
                          "method": "tools/call",
                          "params": {
                              "name": name,
                              "arguments": arguments,
                          },
                      },
                  )

              def structured(result, label):
                  content = result.get("structuredContent")
                  if not isinstance(content, dict):
                      raise SystemExit(f"{label} did not return structured content: {result}")
                  return content

              def assert_tool_success(result, label):
                  if result.get("isError") is not False:
                      raise SystemExit(f"{label} returned tool error: {result}")
                  return structured(result, label)

              def missing_evidence_count(summary):
                  failure_codes = summary.get("failure_codes")
                  if not isinstance(failure_codes, dict):
                      raise SystemExit(f"missing failure_codes in summary: {summary}")
                  count = failure_codes.get("missing_evidence")
                  if not isinstance(count, int) or count <= 0:
                      raise SystemExit(f"missing_evidence was not counted: {summary}")
                  return count

              try:
                  initialize = request(
                      1,
                      {
                          "jsonrpc": "2.0",
                          "id": 1,
                          "method": "initialize",
                          "params": {
                              "protocolVersion": "2025-11-25",
                              "capabilities": {},
                              "clientInfo": {
                                  "name": "cairnid-mcp-release-smoke",
                                  "version": "0.0.0",
                              },
                          },
                      },
                  )
                  assert initialize["serverInfo"]["name"] == "cairnid-mcp", initialize
                  assert isinstance(initialize["capabilities"]["tools"], dict), initialize
                  write({"jsonrpc": "2.0", "method": "notifications/initialized"})
                  tools = request(
                      2,
                      {
                          "jsonrpc": "2.0",
                          "id": 2,
                          "method": "tools/list",
                          "params": {},
                      },
                  )
                  names = sorted(tool["name"] for tool in tools["tools"])
                  assert names == expected_tools, names
                  assert_tools_list_output_schemas(tools["tools"])

                  plan = call_tool(3, "cairnid.evidence_plan", {})
                  plan_content = assert_tool_success(plan, "evidence_plan")
                  assert plan_content["schema_version"] == "cairnid.mcp.evidence.v1", plan_content
                  assert plan_content["status"] == "ready", plan_content

                  manifest = call_tool(4, "cairnid.evidence_manifest", {})
                  manifest_content = assert_tool_success(manifest, "evidence_manifest")
                  assert manifest_content["schema_version"] == "cairnid.mcp.evidence.v1", manifest_content
                  if not manifest_content.get("artifacts"):
                      raise SystemExit(f"evidence_manifest omitted artifacts: {manifest_content}")

                  status = call_tool(
                      5,
                      "cairnid.evidence_status",
                      {"evidence_dir": "release-evidence"},
                  )
                  status_content = assert_tool_success(status, "evidence_status")
                  assert status_content["schema_version"] == "cairnid.mcp.evidence.v1", status_content
                  assert status_content["status"] == "incomplete", status_content
                  missing_evidence_count(status_content)

                  check = call_tool(
                      6,
                      "cairnid.evidence_check",
                      {"evidence_dir": "release-evidence"},
                  )
                  if check.get("isError") is not True:
                      raise SystemExit(f"evidence_check unexpectedly succeeded: {check}")
                  check_content = structured(check, "evidence_check")
                  error = check_content.get("error")
                  if not isinstance(error, dict):
                      raise SystemExit(f"evidence_check missing structured error: {check}")
                  assert check_content["schema_version"] == "cairnid.mcp.evidence.v1", check_content
                  assert error["code"] == "release_evidence_incomplete", error
                  assert error["failure_code"] == "missing_evidence", error
                  assert error["summary"]["status"] == "incomplete", error
                  missing_evidence_count(error)

                  time.sleep(0.2)
                  extra_stdout = []
                  while True:
                      try:
                          extra_stdout.append(responses.get_nowait())
                      except queue.Empty:
                          break
                  if extra_stdout:
                      assert_no_sentinel("unexpected MCP stdout", extra_stdout)
                      raise SystemExit(f"MCP wrote unexpected stdout after tools/call: {extra_stdout}")
                  assert_no_sentinel(
                      "MCP stdio smoke",
                      "".join(stdout_lines),
                      "".join(stderr_lines),
                      observed_responses,
                  )
                  if stderr_lines:
                      raise SystemExit(f"MCP wrote stderr during stdio smoke: {safe_stderr(stderr_lines)}")
              finally:
                  if process.poll() is None:
                      process.kill()
                      process.wait(timeout=5)

      - name: Generate CLI completions and manpages
        shell: python
        run: |
          import os
          import pathlib
          import subprocess

          cli = pathlib.Path(os.environ["CLI_BINARY"]).resolve()
          output_dir = pathlib.Path(os.environ["CLI_AUX_DIR"])
          completion_files = [
              (("completions", "cairnid.bash"), ["completions", "bash"]),
              (("completions", "_cairnid"), ["completions", "zsh"]),
              (("completions", "cairnid.fish"), ["completions", "fish"]),
              (("completions", "cairnid.ps1"), ["completions", "powershell"]),
              (("completions", "cairnid.elv"), ["completions", "elvish"]),
          ]
          manpage_files = [
              "cairnid.1",
              "cairnid-completions.1",
              "cairnid-evidence.1",
              "cairnid-evidence-plan.1",
              "cairnid-evidence-manifest.1",
              "cairnid-evidence-init.1",
              "cairnid-evidence-status.1",
              "cairnid-evidence-check.1",
              "cairnid-release-assets.1",
              "cairnid-release-assets-verify.1",
              "cairnid-manpage.1",
              "cairnid-manpages.1",
          ]

          for relative_path, args in completion_files:
              path = output_dir.joinpath(*relative_path)
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("wb") as handle:
                  subprocess.run([str(cli), *args], stdout=handle, check=True)
              if path.stat().st_size == 0:
                  raise SystemExit(f"generated file is empty: {path}")

          manpage_dir = output_dir / "man" / "man1"
          subprocess.run([str(cli), "manpages", str(manpage_dir)], check=True)
          for file_name in manpage_files:
              path = manpage_dir / file_name
              if not path.is_file():
                  raise SystemExit(f"generated manpage is missing: {path}")
              if path.stat().st_size == 0:
                  raise SystemExit(f"generated manpage is empty: {path}")

      - name: Package Linux archives
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          release_dir="target/${TARGET}/release"

          for binary in cairnid cairnid-mcp; do
            archive_base="${binary}-${RELEASE_TAG}-${TARGET}"
            staging_dir="${RUNNER_TEMP}/${archive_base}"
            mkdir -p "$staging_dir"
            cp "${release_dir}/${binary}" "$staging_dir/"
            cp LICENSE README.md "$staging_dir/"
            if [[ "$binary" == "cairnid" ]]; then
              cp -R "${CLI_AUX_DIR}/." "$staging_dir/"
            fi
            tar -czf "dist/${archive_base}.tar.gz" -C "$RUNNER_TEMP" "$archive_base"
          done

      - name: Package Windows archives
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $releaseDir = Join-Path $PWD "target\$env:TARGET\release"

          foreach ($binary in @("cairnid", "cairnid-mcp")) {
            $archiveBase = "$binary-$env:RELEASE_TAG-$env:TARGET"
            $stagingDir = Join-Path $env:RUNNER_TEMP $archiveBase
            New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
            Copy-Item (Join-Path $releaseDir "$binary.exe") $stagingDir
            Copy-Item LICENSE, README.md $stagingDir
            if ($binary -eq "cairnid") {
              Get-ChildItem -LiteralPath $env:CLI_AUX_DIR | Copy-Item -Destination $stagingDir -Recurse -Force
            }
            Compress-Archive -Path $stagingDir -DestinationPath "dist\$archiveBase.zip" -Force
          }

      - name: Smoke archive-installed CLI and MCP
        shell: python
        env:
          CAIRN_ENV: production
          DATABASE_URL: postgres://CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE@example.invalid/cairn_identity
          CAIRN_ISSUER: https://id.example.com
          CAIRN_PUBLIC_WEB_ORIGIN: https://app.example.com
          CAIRN_BOOTSTRAP_SETUP_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_EMAIL_PROVIDER: command
          CAIRN_EMAIL_COMMAND_PATH: /usr/local/bin/cairn-send-email
          CAIRN_CONFORMANCE_ALIAS: cairn-release
          CAIRN_CONFORMANCE_CLIENT_ID: client-one
          CAIRN_CONFORMANCE_CLIENT_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_CONFORMANCE_CLIENT2_ID: client-two
          CAIRN_CONFORMANCE_CLIENT2_SECRET: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_CONFORMANCE_SUITE_BASE_URL: https://www.certification.openid.net/
          CAIRN_SCIM_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_SCIM_SECONDARY_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_SCIM_REJECTED_BEARER_TOKEN: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_BREAK_GLASS_CONFIRM: grant-admin-owner
          CAIRN_OLD_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
          CAIRN_NEW_KEY_ENCRYPTION_KEY: CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE
        run: |
          import json
          import os
          import queue
          import subprocess
          import tarfile
          import tempfile
          import threading
          import time
          import zipfile
          from pathlib import Path

          SENTINEL = "CAIRNID_RELEASE_SMOKE_SECRET_DO_NOT_EXPOSE"
          expected_tools = [
              "cairnid.evidence_check",
              "cairnid.evidence_manifest",
              "cairnid.evidence_plan",
              "cairnid.evidence_status",
          ]

          tag = os.environ["RELEASE_TAG"]
          expected_version = os.environ["RELEASE_VERSION"]
          target = os.environ["TARGET"]
          archive_ext = os.environ["ARCHIVE_EXT"]
          binary_ext = os.environ["BINARY_EXT"]

          def assert_no_sentinel(label, *values):
              for value in values:
                  text = value if isinstance(value, str) else json.dumps(value, sort_keys=True)
                  if SENTINEL in text:
                      raise SystemExit(f"{label} leaked sentinel")

          def safe_stderr(stderr_lines):
              text = "".join(stderr_lines)
              if SENTINEL in text:
                  return "[redacted: sentinel appeared in stderr]"
              return text

          def extract_archive(binary, root):
              archive_base = f"{binary}-{tag}-{target}"
              archive_path = Path("dist") / f"{archive_base}.{archive_ext}"
              if not archive_path.is_file():
                  raise SystemExit(f"missing archive {archive_path}")

              destination = root / binary
              destination.mkdir()
              if archive_ext == "zip":
                  with zipfile.ZipFile(archive_path) as archive:
                      archive.extractall(destination)
              elif archive_ext == "tar.gz":
                  with tarfile.open(archive_path, "r:gz") as archive:
                      archive.extractall(destination)
              else:
                  raise SystemExit(f"unsupported archive extension: {archive_ext}")

              executable = destination / archive_base / f"{binary}{binary_ext}"
              if not executable.is_file():
                  raise SystemExit(f"archive did not contain expected binary: {executable}")
              return executable

          def run_binary(label, binary, *args, require_empty_stderr=False):
              result = subprocess.run(
                  [str(binary), *args],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              assert_no_sentinel(label, result.stdout, result.stderr)
              if result.returncode != 0:
                  raise SystemExit(
                      f"{label} {' '.join(args)} failed with exit code {result.returncode}: {result.stderr}"
                  )
              if require_empty_stderr and result.stderr:
                  raise SystemExit(f"{label} {' '.join(args)} wrote stderr: {result.stderr}")
              return result

          def assert_version_output(label, result, binary_name):
              expected_output = f"{binary_name} {expected_version}"
              actual_output = result.stdout.strip()
              if actual_output != expected_output:
                  raise SystemExit(
                      f"{label} --version mismatch: expected {expected_output!r}, "
                      f"actual output {actual_output!r}"
                  )
              if result.stderr.strip():
                  raise SystemExit(f"{label} --version wrote stderr: {result.stderr.strip()!r}")

          def initialize_evidence_dir(cli, root):
              evidence_dir = root / "release-evidence"
              result = run_binary(
                  "archive CLI",
                  cli,
                  "evidence",
                  "init",
                  str(evidence_dir),
                  require_empty_stderr=True,
              )
              init = json.loads(result.stdout)
              if init.get("status") != "initialized":
                  raise SystemExit(f"archive CLI evidence init returned unexpected JSON: {init}")
              return evidence_dir

          def assert_tools_list_output_schemas(tools):
              if not isinstance(tools, list):
                  raise SystemExit(f"archive MCP tools/list did not return a tools array: {tools}")
              tools_by_name = {tool.get("name"): tool for tool in tools if isinstance(tool, dict)}
              for name in expected_tools:
                  tool = tools_by_name.get(name)
                  if tool is None:
                      raise SystemExit(f"archive MCP tools/list omitted {name}: {tools}")
                  schema = tool.get("outputSchema")
                  if not isinstance(schema, dict):
                      raise SystemExit(f"archive MCP tool {name} omitted outputSchema: {tool}")
                  if schema.get("type") != "object":
                      raise SystemExit(f"archive MCP tool {name} outputSchema is not an object schema: {schema}")
                  variants = schema.get("oneOf")
                  if not isinstance(variants, list) or len(variants) != 2:
                      raise SystemExit(f"archive MCP tool {name} outputSchema should expose success and error variants: {schema}")
                  encoded_schema = json.dumps(schema, sort_keys=True)
                  if "schema_version" not in encoded_schema:
                      raise SystemExit(f"archive MCP tool {name} outputSchema omits schema_version: {schema}")

          def assert_structured_content_matches_text(result, label):
              content = result.get("structuredContent")
              if not isinstance(content, dict):
                  raise SystemExit(f"{label} did not return structured content: {result}")
              text_items = result.get("content")
              if not isinstance(text_items, list) or not text_items:
                  raise SystemExit(f"{label} did not return text content: {result}")
              first_text = text_items[0]
              if not isinstance(first_text, dict) or first_text.get("type") != "text":
                  raise SystemExit(f"{label} content[0] was not text: {result}")
              text = first_text.get("text")
              if not isinstance(text, str):
                  raise SystemExit(f"{label} content[0].text was not a string: {result}")
              try:
                  text_json = json.loads(text)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{label} content[0].text was not JSON: {text!r}") from exc
              if text_json != content:
                  raise SystemExit(
                      f"{label} content[0].text did not mirror structuredContent: "
                      f"text={text_json}; structured={content}"
                  )
              return content

          def assert_tool_success(result, label):
              if result.get("isError") is not False:
                  raise SystemExit(f"{label} returned tool error: {result}")
              return assert_structured_content_matches_text(result, label)

          def missing_evidence_count(summary):
              failure_codes = summary.get("failure_codes")
              if not isinstance(failure_codes, dict):
                  raise SystemExit(f"missing failure_codes in summary: {summary}")
              count = failure_codes.get("missing_evidence")
              if not isinstance(count, int) or count <= 0:
                  raise SystemExit(f"missing_evidence was not counted: {summary}")
              return count

          def smoke_mcp_stdio(binary, root):
              process = subprocess.Popen(
                  [str(binary)],
                  cwd=root,
                  env={**os.environ, "RUST_LOG": "off"},
                  stdin=subprocess.PIPE,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              responses = queue.Queue()
              observed_responses = []
              stdout_lines = []
              stderr_lines = []

              def read_stdout():
                  for line in process.stdout:
                      stdout_lines.append(line)
                      if line.strip():
                          responses.put(line)

              def read_stderr():
                  for line in process.stderr:
                      stderr_lines.append(line)

              threading.Thread(target=read_stdout, daemon=True).start()
              threading.Thread(target=read_stderr, daemon=True).start()

              def write(message):
                  if process.poll() is not None:
                      raise SystemExit(
                          f"MCP server exited before request; code={process.returncode}; "
                          f"stderr={safe_stderr(stderr_lines)}"
                      )
                  process.stdin.write(json.dumps(message) + "\n")
                  process.stdin.flush()

              def request(request_id, message):
                  write(message)
                  deadline = time.monotonic() + 10
                  while True:
                      remaining = deadline - time.monotonic()
                      if remaining <= 0:
                          raise SystemExit(
                              f"timed out waiting for MCP response {request_id}; "
                              f"stderr={safe_stderr(stderr_lines)}"
                          )
                      try:
                          line = responses.get(timeout=remaining)
                      except queue.Empty:
                          raise SystemExit(
                              f"timed out waiting for MCP response {request_id}; "
                              f"stderr={safe_stderr(stderr_lines)}"
                          ) from None
                      assert_no_sentinel("archive MCP stdout", line)
                      try:
                          response = json.loads(line)
                      except json.JSONDecodeError as exc:
                          raise SystemExit(
                              f"archive MCP wrote non-JSON stdout: {line!r}; stderr={safe_stderr(stderr_lines)}"
                          ) from exc
                      assert_no_sentinel(f"archive MCP response {request_id}", response)
                      observed_responses.append(response)
                      if response.get("id") != request_id:
                          raise SystemExit(
                              f"archive MCP response id mismatch for request {request_id}: {response}"
                          )
                      if "error" in response:
                          raise SystemExit(f"archive MCP response {request_id} returned error: {response}")
                      return response["result"]

              def call_tool(request_id, name, arguments):
                  return request(
                      request_id,
                      {
                          "jsonrpc": "2.0",
                          "id": request_id,
                          "method": "tools/call",
                          "params": {
                              "name": name,
                              "arguments": arguments,
                          },
                      },
                  )

              try:
                  initialize = request(
                      1,
                      {
                          "jsonrpc": "2.0",
                          "id": 1,
                          "method": "initialize",
                          "params": {
                              "protocolVersion": "2025-11-25",
                              "capabilities": {},
                              "clientInfo": {
                                  "name": "cairnid-mcp-archive-release-smoke",
                                  "version": "0.0.0",
                              },
                          },
                      },
                  )
                  assert initialize["serverInfo"]["name"] == "cairnid-mcp", initialize
                  assert isinstance(initialize["capabilities"]["tools"], dict), initialize
                  write({"jsonrpc": "2.0", "method": "notifications/initialized"})
                  tools = request(
                      2,
                      {
                          "jsonrpc": "2.0",
                          "id": 2,
                          "method": "tools/list",
                          "params": {},
                      },
                  )
                  names = sorted(tool["name"] for tool in tools["tools"])
                  assert names == expected_tools, names
                  assert_tools_list_output_schemas(tools["tools"])

                  plan = call_tool(3, "cairnid.evidence_plan", {})
                  plan_content = assert_tool_success(plan, "archive MCP evidence_plan")
                  assert plan_content["schema_version"] == "cairnid.mcp.evidence.v1", plan_content
                  assert plan_content["status"] == "ready", plan_content
                  if not plan_content.get("steps"):
                      raise SystemExit(f"archive MCP evidence_plan omitted steps: {plan_content}")

                  manifest = call_tool(4, "cairnid.evidence_manifest", {})
                  manifest_content = assert_tool_success(manifest, "archive MCP evidence_manifest")
                  assert manifest_content["schema_version"] == "cairnid.mcp.evidence.v1", manifest_content
                  if not manifest_content.get("artifacts"):
                      raise SystemExit(f"archive MCP evidence_manifest omitted artifacts: {manifest_content}")

                  status = call_tool(
                      5,
                      "cairnid.evidence_status",
                      {"evidence_dir": "release-evidence"},
                  )
                  status_content = assert_tool_success(status, "archive MCP evidence_status")
                  assert status_content["schema_version"] == "cairnid.mcp.evidence.v1", status_content
                  assert status_content["status"] == "incomplete", status_content
                  missing_evidence_count(status_content)

                  check = call_tool(
                      6,
                      "cairnid.evidence_check",
                      {"evidence_dir": "release-evidence"},
                  )
                  if check.get("isError") is not True:
                      raise SystemExit(f"archive MCP evidence_check unexpectedly succeeded: {check}")
                  check_content = assert_structured_content_matches_text(
                      check,
                      "archive MCP evidence_check",
                  )
                  assert check_content["schema_version"] == "cairnid.mcp.evidence.v1", check_content
                  error = check_content.get("error")
                  if not isinstance(error, dict):
                      raise SystemExit(f"archive MCP evidence_check missing structured error: {check}")
                  assert error["code"] == "release_evidence_incomplete", error
                  assert error["failure_code"] == "missing_evidence", error
                  assert error["summary"]["status"] == "incomplete", error
                  missing_evidence_count(error)

                  time.sleep(0.2)
                  extra_stdout = []
                  while True:
                      try:
                          extra_stdout.append(responses.get_nowait())
                      except queue.Empty:
                          break
                  if extra_stdout:
                      assert_no_sentinel("unexpected archive MCP stdout", extra_stdout)
                      for line in extra_stdout:
                          try:
                              json.loads(line)
                          except json.JSONDecodeError as exc:
                              raise SystemExit(
                                  f"archive MCP wrote non-JSON stdout: {line!r}; "
                                  f"stderr={safe_stderr(stderr_lines)}"
                              ) from exc
                      raise SystemExit(f"archive MCP wrote unexpected stdout after tools/call: {extra_stdout}")
                  if len(stdout_lines) != len(observed_responses):
                      raise SystemExit(
                          "archive MCP wrote stdout outside JSON-RPC responses: "
                          f"stdout={stdout_lines!r}; responses={observed_responses!r}"
                      )
                  for line in stdout_lines:
                      if not line.endswith("\n"):
                          raise SystemExit(f"archive MCP wrote stdout without newline delimiter: {line!r}")
                  assert_no_sentinel(
                      "archive MCP stdio smoke",
                      "".join(stdout_lines),
                      "".join(stderr_lines),
                      observed_responses,
                  )
                  if stderr_lines:
                      raise SystemExit(f"archive MCP wrote stderr during stdio smoke: {safe_stderr(stderr_lines)}")
              finally:
                  if process.poll() is None:
                      process.kill()
                      process.wait(timeout=5)

          with tempfile.TemporaryDirectory(prefix="cairnid-archive-release-") as root_name:
              root = Path(root_name)
              cli = extract_archive("cairnid", root)
              mcp = extract_archive("cairnid-mcp", root)
              assert_version_output(
                  "archive CLI",
                  run_binary("archive CLI", cli, "--version", require_empty_stderr=True),
                  "cairnid",
              )
              run_binary("archive CLI", cli, "--help")
              initialize_evidence_dir(cli, root)
              assert_version_output(
                  "archive MCP",
                  run_binary("archive MCP", mcp, "--version", require_empty_stderr=True),
                  "cairnid-mcp",
              )
              run_binary("archive MCP", mcp, "--help", require_empty_stderr=True)
              smoke_mcp_stdio(mcp, root)

      - name: Upload packaged release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  assemble:
    name: Assemble release assets
    needs: [prepare, build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
      RELEASE_SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      RELEASE_SOURCE_CI_RUN_URL: ${{ needs.prepare.outputs.ci_run_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Download packaged release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: List packaged archives
        shell: bash
        run: find dist -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Install cargo-cyclonedx
        shell: bash
        run: cargo install cargo-cyclonedx --locked --version "$CARGO_CYCLONEDX_VERSION"

      - name: Generate CycloneDX SBOMs
        shell: bash
        run: |
          set -euo pipefail

          for target in "$LINUX_TARGET" "$WINDOWS_TARGET"; do
            api_sbom="apps/api/cairn-api_bin_${target}.cdx.json"
            cli_sbom="apps/cli/cairnid_bin_${target}.cdx.json"
            mcp_sbom="apps/mcp/cairnid-mcp_bin_${target}.cdx.json"
            rm -f "$api_sbom" "$cli_sbom" "$mcp_sbom"

            cargo cyclonedx \
              --manifest-path apps/cli/Cargo.toml \
              --format json \
              --describe binaries \
              --target "$target" \
              --target-in-filename \
              --spec-version 1.5 \
              --no-build-deps \
              -q

            test -f "$cli_sbom"
            test -f "$mcp_sbom"
            mv "$cli_sbom" "dist/cairnid-${RELEASE_TAG}-${target}.sbom.cdx.json"
            mv "$mcp_sbom" "dist/cairnid-mcp-${RELEASE_TAG}-${target}.sbom.cdx.json"

            test -f "$api_sbom"
            rm "$api_sbom"
            echo "Discarded non-release API SBOM $api_sbom"

            mapfile -t remaining_sboms < <(find apps -type f -name "*_${target}.cdx.json" | sort)
            if (( ${#remaining_sboms[@]} > 0 )); then
              printf '::error::unexpected generated SBOM left outside dist: %s\n' "${remaining_sboms[@]}"
              exit 1
            fi
          done

      - name: Generate release manifest
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import subprocess
          from datetime import datetime, timezone

          dist = pathlib.Path("dist")
          tag = os.environ["RELEASE_TAG"]
          version = os.environ["RELEASE_VERSION"]
          prerelease = os.environ["RELEASE_PRERELEASE"] == "true"

          targets = [
              {
                  "target": os.environ["LINUX_TARGET"],
                  "os": "linux",
                  "arch": "x86_64",
                  "archive_ext": "tar.gz",
              },
              {
                  "target": os.environ["WINDOWS_TARGET"],
                  "os": "windows",
                  "arch": "x86_64",
                  "archive_ext": "zip",
              },
          ]
          binaries = [
              {"name": "cairnid", "package": "apps/cli", "description": "operator CLI"},
              {"name": "cairnid-mcp", "package": "apps/mcp", "description": "stdio MCP server"},
          ]
          cli_auxiliary_files = [
              {"path": "completions/cairnid.bash", "kind": "shell-completion", "shell": "bash"},
              {"path": "completions/_cairnid", "kind": "shell-completion", "shell": "zsh"},
              {"path": "completions/cairnid.fish", "kind": "shell-completion", "shell": "fish"},
              {"path": "completions/cairnid.ps1", "kind": "shell-completion", "shell": "powershell"},
              {"path": "completions/cairnid.elv", "kind": "shell-completion", "shell": "elvish"},
              {"path": "man/man1/cairnid.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-completions.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-evidence.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-evidence-plan.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-evidence-manifest.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-evidence-init.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-evidence-status.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-evidence-check.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-release-assets.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-release-assets-verify.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-manpage.1", "kind": "manpage", "section": "1"},
              {"path": "man/man1/cairnid-manpages.1", "kind": "manpage", "section": "1"},
          ]

          def sha256(path: pathlib.Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          def command_version(command: list[str]) -> str:
              try:
                  return subprocess.check_output(command, text=True).strip()
              except Exception as exc:
                  return f"unavailable: {exc}"

          assets = []
          for binary in binaries:
              for target in targets:
                  stem = f"{binary['name']}-{tag}-{target['target']}"
                  archive_name = f"{stem}.{target['archive_ext']}"
                  sbom_name = f"{stem}.sbom.cdx.json"
                  archive_path = dist / archive_name
                  sbom_path = dist / sbom_name
                  if not archive_path.is_file():
                      raise SystemExit(f"missing archive {archive_name}")
                  if not sbom_path.is_file():
                      raise SystemExit(f"missing SBOM {sbom_name}")
                  archive_asset = {
                      "name": archive_name,
                      "kind": "archive",
                      "binary": binary["name"],
                      "description": binary["description"],
                      "target": target["target"],
                      "os": target["os"],
                      "arch": target["arch"],
                      "archive_format": target["archive_ext"],
                      "sha256": sha256(archive_path),
                      "size_bytes": archive_path.stat().st_size,
                      "sbom": sbom_name,
                  }
                  if binary["name"] == "cairnid":
                      archive_asset["auxiliary_files"] = [
                          {**file, "path": f"{stem}/{file['path']}"}
                          for file in cli_auxiliary_files
                      ]
                  assets.append(archive_asset)
                  assets.append(
                      {
                          "name": sbom_name,
                          "kind": "sbom",
                          "binary": binary["name"],
                          "format": "CycloneDX JSON",
                          "target": target["target"],
                          "os": target["os"],
                          "arch": target["arch"],
                          "sha256": sha256(sbom_path),
                          "size_bytes": sbom_path.stat().st_size,
                          "subject": archive_name,
                      }
                  )

          source = {
              "repository": os.environ["GITHUB_REPOSITORY"],
              "commit": os.environ["RELEASE_SOURCE_COMMIT"],
              "ref": os.environ["GITHUB_REF"],
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "workflow_ref": os.environ.get("GITHUB_WORKFLOW_REF", ""),
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }
          validated_ci_run_url = os.environ.get("RELEASE_SOURCE_CI_RUN_URL", "").strip()
          if validated_ci_run_url:
              source["validated_ci_run_url"] = validated_ci_run_url

          manifest = {
              "schema_version": 1,
              "project": "cairnid",
              "tag": tag,
              "version": version,
              "release_type": "release-candidate" if prerelease else "versioned",
              "draft": True,
              "prerelease": prerelease,
              "generated_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "source": source,
              "distribution": {
                  "release_workflow": ".github/workflows/release.yml",
                  "crates_io": False,
                  "homebrew": False,
                  "msi": False,
                  "macos": False,
                  "containers": False,
              },
              "checksums": {
                  "algorithm": "SHA-256",
                  "file": "SHA256SUMS.txt",
                  "note": "GitHub also exposes release asset digest metadata after upload.",
              },
              "provenance": {
                  "github_artifact_attestations": True,
                  "action": "actions/attest@v4",
                  "key_material": "GitHub Actions OIDC and Sigstore; no long-lived signing key",
              },
              "sbom": {
                  "generator": "cargo-cyclonedx",
                  "generator_version": os.environ["CARGO_CYCLONEDX_VERSION"],
                  "format": "CycloneDX JSON",
                  "spec_version": "1.5",
              },
              "tools": {
                  "rustc": command_version(["rustc", "--version"]),
                  "cargo": command_version(["cargo", "--version"]),
                  "cargo_cyclonedx": command_version(["cargo", "cyclonedx", "--version"]),
              },
              "assets": assets,
          }

          output = dist / "release-manifest.json"
          output.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import hashlib
          import pathlib

          dist = pathlib.Path("dist")
          files = sorted(
              path for path in dist.iterdir()
              if path.is_file() and path.name != "SHA256SUMS.txt"
          )
          with (dist / "SHA256SUMS.txt").open("w", encoding="utf-8", newline="\n") as handle:
              for path in files:
                  handle.write(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n")
          PY

      - name: Validate release asset set
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import pathlib
          import tarfile
          import zipfile

          dist = pathlib.Path("dist")
          files = sorted(path.name for path in dist.iterdir() if path.is_file())
          expected_count = 10
          if len(files) != expected_count:
              raise SystemExit(f"expected {expected_count} release assets, found {len(files)}: {files}")

          tag = os.environ["RELEASE_TAG"]
          targets = [
              (os.environ["LINUX_TARGET"], "tar.gz"),
              (os.environ["WINDOWS_TARGET"], "zip"),
          ]
          cli_auxiliary_paths = [
              "completions/cairnid.bash",
              "completions/_cairnid",
              "completions/cairnid.fish",
              "completions/cairnid.ps1",
              "completions/cairnid.elv",
              "man/man1/cairnid.1",
              "man/man1/cairnid-completions.1",
              "man/man1/cairnid-evidence.1",
              "man/man1/cairnid-evidence-plan.1",
              "man/man1/cairnid-evidence-manifest.1",
              "man/man1/cairnid-evidence-init.1",
              "man/man1/cairnid-evidence-status.1",
              "man/man1/cairnid-evidence-check.1",
              "man/man1/cairnid-release-assets.1",
              "man/man1/cairnid-release-assets-verify.1",
              "man/man1/cairnid-manpage.1",
              "man/man1/cairnid-manpages.1",
          ]

          def archive_members(path):
              if path.suffix == ".zip":
                  with zipfile.ZipFile(path) as archive:
                      return {name.replace("\\", "/") for name in archive.namelist()}
              with tarfile.open(path, "r:gz") as archive:
                  return {name.replace("\\", "/") for name in archive.getnames()}

          manifest = json.loads((dist / "release-manifest.json").read_text(encoding="utf-8"))
          if len(manifest["assets"]) != 8:
              raise SystemExit("release manifest must describe 4 archives and 4 SBOMs")
          archives = {
              asset["name"]: asset
              for asset in manifest["assets"]
              if asset.get("kind") == "archive"
          }
          for target, archive_ext in targets:
              cli_stem = f"cairnid-{tag}-{target}"
              cli_archive_name = f"{cli_stem}.{archive_ext}"
              cli_expected = [f"{cli_stem}/{path}" for path in cli_auxiliary_paths]
              cli_members = archive_members(dist / cli_archive_name)
              missing = [path for path in cli_expected if path not in cli_members]
              if missing:
                  raise SystemExit(f"{cli_archive_name} is missing CLI auxiliary files: {missing}")
              cli_expected_metadata = [
                  {**file, "path": f"{cli_stem}/{file['path']}"}
                  for file in [
                      {"path": "completions/cairnid.bash", "kind": "shell-completion", "shell": "bash"},
                      {"path": "completions/_cairnid", "kind": "shell-completion", "shell": "zsh"},
                      {"path": "completions/cairnid.fish", "kind": "shell-completion", "shell": "fish"},
                      {"path": "completions/cairnid.ps1", "kind": "shell-completion", "shell": "powershell"},
                      {"path": "completions/cairnid.elv", "kind": "shell-completion", "shell": "elvish"},
                      {"path": "man/man1/cairnid.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-completions.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-evidence.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-evidence-plan.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-evidence-manifest.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-evidence-init.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-evidence-status.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-evidence-check.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-release-assets.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-release-assets-verify.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-manpage.1", "kind": "manpage", "section": "1"},
                      {"path": "man/man1/cairnid-manpages.1", "kind": "manpage", "section": "1"},
                  ]
              ]
              if archives[cli_archive_name].get("auxiliary_files", []) != cli_expected_metadata:
                  raise SystemExit(
                      f"{cli_archive_name} manifest auxiliary file metadata does not match archive contents"
                  )

              mcp_stem = f"cairnid-mcp-{tag}-{target}"
              mcp_archive_name = f"{mcp_stem}.{archive_ext}"
              mcp_forbidden = {f"{mcp_stem}/{path}" for path in cli_auxiliary_paths}
              mcp_members = archive_members(dist / mcp_archive_name)
              unexpected = sorted(mcp_members.intersection(mcp_forbidden))
              if unexpected:
                  raise SystemExit(f"{mcp_archive_name} contains CLI-only files: {unexpected}")
              if "auxiliary_files" in archives[mcp_archive_name]:
                  raise SystemExit(f"{mcp_archive_name} manifest must not list CLI auxiliary files")
          for sbom in dist.glob("*.sbom.cdx.json"):
              data = json.loads(sbom.read_text(encoding="utf-8"))
              if data.get("bomFormat") != "CycloneDX":
                  raise SystemExit(f"{sbom.name} is not a CycloneDX JSON SBOM")
          PY

      - name: Upload assembled release assets
        uses: actions/upload-artifact@v7
        with:
          name: assembled-release-assets-${{ needs.prepare.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create draft release
    needs: [prepare, assemble]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
      RELEASE_SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      RELEASE_SOURCE_CI_RUN_URL: ${{ needs.prepare.outputs.ci_run_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Download assembled release assets
        uses: actions/download-artifact@v8
        with:
          name: assembled-release-assets-${{ needs.prepare.outputs.tag }}
          path: dist

      - name: List assembled release assets
        shell: bash
        run: find dist -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Attest release asset provenance
        uses: actions/attest@v4
        with:
          subject-path: 'dist/*'

      - name: Attest Linux CLI SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/cairnid-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
          sbom-path: dist/cairnid-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-gnu.sbom.cdx.json

      - name: Attest Linux MCP SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/cairnid-mcp-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
          sbom-path: dist/cairnid-mcp-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-gnu.sbom.cdx.json

      - name: Attest Windows CLI SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/cairnid-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.zip
          sbom-path: dist/cairnid-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.sbom.cdx.json

      - name: Attest Windows MCP SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/cairnid-mcp-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.zip
          sbom-path: dist/cairnid-mcp-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.sbom.cdx.json

      - name: Verify assembled release assets with produced CLI
        shell: bash
        run: |
          set -euo pipefail

          verifier_root="$(mktemp -d "${RUNNER_TEMP}/cairnid-release-assets-verifier.XXXXXX")"
          tar -xzf "dist/cairnid-${RELEASE_TAG}-${LINUX_TARGET}.tar.gz" -C "$verifier_root"
          verifier="${verifier_root}/cairnid-${RELEASE_TAG}-${LINUX_TARGET}/cairnid"
          test -x "$verifier"

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          set +e
          "$verifier" release-assets verify dist \
            --tag "$RELEASE_TAG" \
            --source-commit "$RELEASE_SOURCE_COMMIT" \
            --run-url "$run_url" \
            --provenance-attestations-verified \
            --sbom-attestations-verified \
            > "$RUNNER_TEMP/release-assets-workflow-verification.json"
          verifier_status=$?
          set -e

          if [[ "$verifier_status" -ne 3 ]]; then
            echo "::error::workflow run verifier should fail only because a public release URL is absent; got exit ${verifier_status}"
            exit 1
          fi

          RUN_URL="$run_url" python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          receipt_path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "release-assets-workflow-verification.json"
          receipt = json.loads(receipt_path.read_text(encoding="utf-8"))
          expected_failures = {
              "release_url must be present for public release evidence; workflow run URLs are workflow-local validation only",
          }
          failures = set(receipt.get("failures", []))
          if receipt.get("status") != "failed" or failures != expected_failures:
              print(json.dumps(receipt, indent=2, sort_keys=True), file=sys.stderr)
              raise SystemExit(
                  "workflow release-assets verification had unexpected failures"
              )
          if receipt.get("release_url") is not None:
              raise SystemExit("workflow verifier receipt must not include release_url")
          if receipt.get("run_url") != os.environ["RUN_URL"]:
              raise SystemExit("workflow verifier receipt did not record the run URL")
          if len(receipt.get("archives", [])) != 4 or len(receipt.get("sboms", [])) != 4:
              raise SystemExit("workflow verifier did not inspect all archives and SBOMs")
          attestations = receipt.get("attestations", {})
          if not attestations.get("provenance_verified") or not attestations.get("sbom_attestations_verified"):
              raise SystemExit("workflow verifier did not record publish-only attestation confirmations")
          PY

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          CairnID ${RELEASE_TAG}
          =====================

          This draft release was assembled by the tag-driven release workflow.

          Assets:
          - cairnid and cairnid-mcp archives for Linux x86_64 and Windows x86_64.
          - Generated Bash, Zsh, Fish, PowerShell, and Elvish completions plus roff manpages for cairnid and its subcommands inside each cairnid CLI archive.
          - CycloneDX JSON SBOMs for each archive.
          - SHA256SUMS.txt and release-manifest.json.
          - GitHub artifact attestations generated with actions/attest@v4 and OIDC.

          Verify after downloading:

              gh attestation verify <asset> --repo ${GITHUB_REPOSITORY} --signer-workflow ${GITHUB_REPOSITORY}/.github/workflows/release.yml --source-ref refs/tags/${RELEASE_TAG}
              gh attestation verify <asset> --repo ${GITHUB_REPOSITORY} --signer-workflow ${GITHUB_REPOSITORY}/.github/workflows/release.yml --source-ref refs/tags/${RELEASE_TAG} --predicate-type https://cyclonedx.org/bom
              sha256sum -c SHA256SUMS.txt --ignore-missing

          This workflow does not publish crates.io packages, Homebrew formulae, MSI installers, macOS notarized assets, Authenticode signatures, containers, or long-lived signing-key signatures.
          EOF

      - name: Create draft GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          assets=(dist/*)
          command=(
            release create "$RELEASE_TAG"
            --verify-tag
            --draft
            --title "CairnID ${RELEASE_TAG}"
            --notes-file release-notes.md
          )

          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            command+=(--prerelease --latest=false)
          fi

          command+=("${assets[@]}")
          gh "${command[@]}"

      - name: Summarize release assets
        shell: bash
        run: |
          {
            echo "## Draft release"
            echo
            echo "Tag: \`${RELEASE_TAG}\`"
            echo
            echo "Assets:"
            find dist -maxdepth 1 -type f -printf '- `%f`\n' | sort
          } >> "$GITHUB_STEP_SUMMARY"

  rehearsal:
    name: Rehearse release assembly
    needs: [prepare, assemble]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
      RELEASE_SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
    steps:
      - uses: actions/checkout@v6

      - name: Download assembled release assets
        uses: actions/download-artifact@v8
        with:
          name: assembled-release-assets-${{ needs.prepare.outputs.tag }}
          path: dist

      - name: List rehearsal assets
        shell: bash
        run: find dist -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Verify rehearsal assets without publish-only confirmations
        shell: bash
        run: |
          set -euo pipefail

          verifier_root="$(mktemp -d "${RUNNER_TEMP}/cairnid-release-rehearsal-verifier.XXXXXX")"
          tar -xzf "dist/cairnid-${RELEASE_TAG}-${LINUX_TARGET}.tar.gz" -C "$verifier_root"
          verifier="${verifier_root}/cairnid-${RELEASE_TAG}-${LINUX_TARGET}/cairnid"
          test -x "$verifier"

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          set +e
          "$verifier" release-assets verify dist \
            --tag "$RELEASE_TAG" \
            --source-commit "$RELEASE_SOURCE_COMMIT" \
            --run-url "$run_url" \
            > "$RUNNER_TEMP/release-assets-rehearsal-verification.json"
          verifier_status=$?
          set -e

          if [[ "$verifier_status" -ne 3 ]]; then
            echo "::error::rehearsal verifier should fail only because publish-only confirmations are absent; got exit ${verifier_status}"
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          receipt_path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "release-assets-rehearsal-verification.json"
          receipt = json.loads(receipt_path.read_text(encoding="utf-8"))
          expected_failures = {
              "release_url must be present for public release evidence; workflow run URLs are workflow-local validation only",
              "--provenance-attestations-verified must be supplied after external provenance attestation verification",
              "--sbom-attestations-verified must be supplied after external SBOM attestation verification",
          }
          expected_ref = f"refs/tags/{os.environ['RELEASE_TAG']}"
          if os.environ["GITHUB_REF"] != expected_ref:
              expected_failures.add(
                  f"release-manifest.json.source.ref must be {expected_ref}"
              )

          failures = set(receipt.get("failures", []))
          if receipt.get("status") != "failed" or failures != expected_failures:
              print(json.dumps(receipt, indent=2, sort_keys=True), file=sys.stderr)
              raise SystemExit(
                  "rehearsal release-assets verification had unexpected failures"
              )
          if len(receipt.get("archives", [])) != 4 or len(receipt.get("sboms", [])) != 4:
              raise SystemExit("rehearsal verifier did not inspect all archives and SBOMs")
          PY

      - name: Upload rehearsal asset bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-rehearsal-assets-${{ needs.prepare.outputs.tag }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

      - name: Summarize rehearsal
        shell: bash
        run: |
          {
            echo "## Release rehearsal"
            echo
            echo "Candidate tag: \`${RELEASE_TAG}\`"
            echo
            echo "This run built, packaged, smoke-tested, assembled, checksummed, and locally verified the candidate CLI/MCP asset set without creating a tag, creating a GitHub Release, or generating attestations."
            echo
            echo "Rehearsal artifacts are short-lived Actions artifacts. They are not public release assets and are not release evidence."
          } >> "$GITHUB_STEP_SUMMARY"
