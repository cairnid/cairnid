name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake nasm pkg-config libssl-dev
      - name: Show Rust version
        run: rustc --version && cargo --version
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Release evidence tooling smoke
        env:
          CAIRN_ENV: production
          DATABASE_URL: postgres://secret-value@example.invalid/cairn_identity
          CAIRN_ISSUER: https://id.example.com
          CAIRN_PUBLIC_WEB_ORIGIN: https://app.example.com
          CAIRN_BOOTSTRAP_SETUP_SECRET: secret-value-bootstrap
          CAIRN_KEY_ENCRYPTION_KEY: secret-value
          CAIRN_EMAIL_PROVIDER: command
          CAIRN_EMAIL_COMMAND_PATH: /usr/local/bin/cairn-send-email
          CAIRN_CONFORMANCE_ALIAS: cairn-ci
          CAIRN_CONFORMANCE_CLIENT_ID: client-one
          CAIRN_CONFORMANCE_CLIENT_SECRET: secret-value
          CAIRN_CONFORMANCE_CLIENT2_ID: client-two
          CAIRN_CONFORMANCE_CLIENT2_SECRET: secret-value
          CAIRN_CONFORMANCE_SUITE_BASE_URL: https://www.certification.openid.net/
          CAIRN_SCIM_BEARER_TOKEN: secret-value
          CAIRN_SCIM_SECONDARY_BEARER_TOKEN: secret-value-two
          CAIRN_SCIM_REJECTED_BEARER_TOKEN: secret-value-rejected
          CAIRN_BREAK_GLASS_CONFIRM: grant-admin-owner
          CAIRN_OLD_KEY_ENCRYPTION_KEY: secret-value-old
          CAIRN_NEW_KEY_ENCRYPTION_KEY: secret-value-new
        run: |
          set -euo pipefail
          evidence_dir="$(mktemp -d)"
          trap 'rm -rf "$evidence_dir"' EXIT
          cargo run -p cairnid --locked -- evidence plan > evidence-plan.json
          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("evidence-plan.json").read_text()
          if "secret-value" in raw:
              raise SystemExit("evidence-plan leaked a placeholder secret value")
          report = json.loads(raw)
          assert report["status"] == "ready", report
          assert report["artifact_count"] == 23, report
          assert report["ready_artifact_count"] == 19, report
          assert report["manual_artifact_count"] == 4, report
          assert report["missing_environment"] == [], report
          PY
          cargo run -p cairnid --locked -- evidence init "$evidence_dir" > evidence-init.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("evidence-init.json").read_text())
          assert report["status"] == "initialized", report
          assert report["artifact_count"] == 23, report
          assert report["files_written"] == [
              "release-evidence-manifest.json",
              "README.md",
              ".gitignore",
          ], report
          PY
          set +e
          cargo run -p cairnid --locked -- evidence status "$evidence_dir" > evidence-status.json
          status=$?
          set -e
          test "$status" -ne 0
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("evidence-status.json").read_text())
          assert report["status"] == "incomplete", report
          assert report["artifact_count"] == 23, report
          assert report["missing_artifact_count"] == 23, report
          assert len(report["next_actions"]) == 23, report
          assert any(
              action["file_name"] == "dependency-policy-check.json"
              and "dependency-policy-evidence" in action["command"]
              for action in report["next_actions"]
          ), report
          assert any(
              action["file_name"] == "cairn-oidcc-static.json"
              and "oidcc-static-config" in action["command"]
              for action in report["next_actions"]
          ), report
          PY

  mcp-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Show Rust version
        run: |
          rustc --version
          cargo --version
      - name: MCP tests
        run: cargo test -p cairnid-mcp --locked
      - name: MCP clippy
        run: cargo clippy -p cairnid-mcp --locked --all-targets -- -D warnings

  dependency-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake nasm pkg-config libssl-dev
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Install dependency security tools
        run: |
          cargo install cargo-deny --locked --version 0.19.8
          cargo install cargo-audit --locked --version 0.22.2
      - name: Cargo deny
        run: cargo deny check
      - name: Cargo audit
        run: cargo audit
      - name: Dependency policy evidence receipt
        run: |
          set -euo pipefail
          cargo run -p cairn-api --locked -- operations dependency-policy-evidence > dependency-policy-check.json
          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("dependency-policy-check.json").read_text()
          forbidden = ('"stdout"', '"stderr"', '"token"', '"secret"', '"password"')
          if any(value in raw.lower() for value in forbidden):
              raise SystemExit("dependency-policy evidence archived forbidden output fields")
          report = json.loads(raw)
          assert report["status"] == "ok", report
          assert report["workspace"]["cargo_lock_present"], report
          assert report["workspace"]["bun_lock_present"], report
          assert report["workspace"]["deny_toml_present"], report
          assert report["workspace"]["cargo_audit_config_present"], report
          assert report["workspace"]["dependency_docs_present"], report
          assert {check["name"] for check in report["checks"]} == {
              "cargo_deny",
              "cargo_audit",
              "bun_audit",
          }, report
          assert all(check["status"] == "passed" for check in report["checks"]), report
          PY

  postgres-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cairn
          POSTGRES_PASSWORD: cairn
          POSTGRES_DB: cairn_identity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cairn -d cairn_identity_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CAIRN_DATABASE_TEST_URL: postgres://cairn:cairn@localhost:5432/cairn_identity_test
    steps:
      - uses: actions/checkout@v6
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake nasm pkg-config libssl-dev
      - name: Database integration tests
        run: cargo test -p cairn-database --tests --locked

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Frontend dependency audit
        run: bun run audit
      - name: Public surface check
        run: bun run check:public-surface
      - name: Docs export check
        run: |
          docs_out="$(realpath -m --relative-to="$GITHUB_WORKSPACE" "$RUNNER_TEMP/site-docs-export-check")"
          bun run docs:site -- --out "$docs_out"
      - name: Check
        run: bun run check
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build
      - name: Install Playwright browser
        run: node apps/web/node_modules/@playwright/test/cli.js install --with-deps chromium
      - name: Browser smoke
        run: bun run test:e2e

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v6
      - name: Show Docker version
        run: docker version
      - name: Validate Compose file
        env:
          CAIRN_KEY_ENCRYPTION_KEY: ci-compose-placeholder
        run: docker compose -f infra/docker-compose.yml config --quiet
      - name: Build API image
        run: docker build --pull --file Dockerfile --tag cairn-api:ci .
      - name: Smoke API image
        run: docker run --rm --entrypoint /usr/local/bin/cairn-api cairn-api:ci signing-key generate-kek
      - name: Build web image
        run: docker build --pull --file apps/web/Dockerfile --tag cairn-web:ci .
      - name: Smoke web image
        run: docker run --rm --entrypoint bun cairn-web:ci --version
      - name: Smoke web health endpoint
        run: |
          docker run --rm -d --name cairn-web-health -e HOST=0.0.0.0 -e PORT=3000 cairn-web:ci
          trap 'docker rm -f cairn-web-health' EXIT
          for attempt in {1..30}; do
            if docker exec cairn-web-health bun scripts/healthcheck.ts; then
              exit 0
            fi
            sleep 1
          done
          docker logs cairn-web-health
          exit 1
