name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install native dependencies
        timeout-minutes: 35
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail

          apt_with_retry() {
            local description="$1"
            shift
            local status=0
            for attempt in 1 2 3; do
              echo "${description} (attempt ${attempt}/3)"
              if sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s 300s "$@"; then
                return 0
              fi
              status=$?
              if [ "$attempt" -eq 3 ]; then
                echo "${description} failed after 3 attempts"
                return "$status"
              fi
              sleep "$((attempt * 10))"
            done
          }

          apt_with_retry "apt-get update" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 update
          apt_with_retry "apt-get install" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 install -y --no-install-recommends cmake nasm pkg-config libssl-dev
      - name: Show Rust version
        run: rustc --version && cargo --version
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Web/API contract check
        run: bun run check:web-api-contract
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Release evidence tooling smoke
        env:
          CAIRN_ENV: production
          DATABASE_URL: postgres://secret-value@example.invalid/cairn_identity
          CAIRN_ISSUER: https://id.example.com
          CAIRN_PUBLIC_WEB_ORIGIN: https://app.example.com
          CAIRN_BOOTSTRAP_SETUP_SECRET: secret-value-bootstrap
          CAIRN_KEY_ENCRYPTION_KEY: secret-value
          CAIRN_EMAIL_PROVIDER: command
          CAIRN_EMAIL_COMMAND_PATH: /usr/local/bin/cairn-send-email
          CAIRN_CONFORMANCE_ALIAS: cairn-ci
          CAIRN_CONFORMANCE_CLIENT_ID: client-one
          CAIRN_CONFORMANCE_CLIENT_SECRET: secret-value
          CAIRN_CONFORMANCE_CLIENT2_ID: client-two
          CAIRN_CONFORMANCE_CLIENT2_SECRET: secret-value
          CAIRN_CONFORMANCE_SUITE_BASE_URL: https://www.certification.openid.net/
          CAIRN_SCIM_BEARER_TOKEN: secret-value
          CAIRN_SCIM_SECONDARY_BEARER_TOKEN: secret-value-two
          CAIRN_SCIM_REJECTED_BEARER_TOKEN: secret-value-rejected
          CAIRN_BREAK_GLASS_CONFIRM: grant-admin-owner
          CAIRN_OLD_KEY_ENCRYPTION_KEY: secret-value-old
          CAIRN_NEW_KEY_ENCRYPTION_KEY: secret-value-new
        run: |
          set -euo pipefail
          evidence_dir="$(mktemp -d)"
          trap 'rm -rf "$evidence_dir"' EXIT
          cargo run -p cairnid --locked -- evidence plan > evidence-plan.json
          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("evidence-plan.json").read_text()
          if "secret-value" in raw:
              raise SystemExit("evidence-plan leaked a placeholder secret value")
          report = json.loads(raw)
          assert report["status"] == "ready", report
          assert report["artifact_count"] == 24, report
          assert report["ready_artifact_count"] == 19, report
          assert report["manual_artifact_count"] == 5, report
          assert report["missing_environment"] == [], report
          PY
          cargo run -p cairnid --locked -- evidence init "$evidence_dir" > evidence-init.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("evidence-init.json").read_text())
          assert report["status"] == "initialized", report
          assert report["artifact_count"] == 24, report
          assert report["files_written"] == [
              "release-evidence-manifest.json",
              "README.md",
              ".gitignore",
          ], report
          PY
          set +e
          cargo run -p cairnid --locked -- evidence status "$evidence_dir" > evidence-status.json
          status=$?
          set -e
          test "$status" -ne 0
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("evidence-status.json").read_text())
          assert report["status"] == "incomplete", report
          assert report["artifact_count"] == 24, report
          assert report["missing_artifact_count"] == 24, report
          assert len(report["next_actions"]) == 24, report
          assert any(
              action["file_name"] == "dependency-policy-check.json"
              and "dependency-policy-evidence" in action["command"]
              for action in report["next_actions"]
          ), report
          assert any(
              action["file_name"] == "cairn-oidcc-static.json"
              and "oidcc-static-config" in action["command"]
              for action in report["next_actions"]
          ), report
          PY

  mcp-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Show Rust version
        run: |
          rustc --version
          cargo --version
      - name: MCP tests
        run: cargo test -p cairnid-mcp --locked
      - name: MCP clippy
        run: cargo clippy -p cairnid-mcp --locked --all-targets -- -D warnings

  cli-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Show Rust version
        run: |
          rustc --version
          cargo --version
      - name: CLI tests
        run: cargo test -p cairnid --locked

  cli-distribution-smoke:
    name: CLI distribution smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CAIRN_ENV: production
      DATABASE_URL: postgres://CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE@example.invalid/cairn_identity
      CAIRN_ISSUER: https://id.example.com
      CAIRN_PUBLIC_WEB_ORIGIN: https://app.example.com
      CAIRN_BOOTSTRAP_SETUP_SECRET: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_KEY_ENCRYPTION_KEY: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_EMAIL_PROVIDER: command
      CAIRN_EMAIL_COMMAND_PATH: /usr/local/bin/cairn-send-email
      CAIRN_CONFORMANCE_ALIAS: cairn-ci
      CAIRN_CONFORMANCE_CLIENT_ID: client-one
      CAIRN_CONFORMANCE_CLIENT_SECRET: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_CONFORMANCE_CLIENT2_ID: client-two
      CAIRN_CONFORMANCE_CLIENT2_SECRET: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_CONFORMANCE_SUITE_BASE_URL: https://www.certification.openid.net/
      CAIRN_SCIM_BEARER_TOKEN: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_SCIM_SECONDARY_BEARER_TOKEN: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_SCIM_REJECTED_BEARER_TOKEN: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_BREAK_GLASS_CONFIRM: grant-admin-owner
      CAIRN_OLD_KEY_ENCRYPTION_KEY: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
      CAIRN_NEW_KEY_ENCRYPTION_KEY: CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: ubuntu
            cli_binary_path: target/release/cairnid
            mcp_binary_path: target/release/cairnid-mcp
          - os: windows-latest
            artifact_os: windows
            cli_binary_path: target\release\cairnid.exe
            mcp_binary_path: target\release\cairnid-mcp.exe
    steps:
      - uses: actions/checkout@v6
      - name: Show Rust version
        run: |
          rustc --version
          cargo --version
      - name: Build release CLI and MCP
        run: cargo build --release -p cairnid -p cairnid-mcp --locked
      - name: Smoke release CLI
        env:
          CLI_BINARY: ${{ matrix.cli_binary_path }}
        shell: python
        run: |
          import json
          import os
          import subprocess
          import tempfile
          from pathlib import Path

          SENTINEL = "CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE"
          cli = Path(os.environ["CLI_BINARY"]).resolve()
          outputs = []

          def run_cli(*args, expect_success=True):
              result = subprocess.run(
                  [str(cli), *args],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              outputs.extend([result.stdout, result.stderr])
              if expect_success and result.returncode != 0:
                  raise SystemExit(f"{' '.join(args)} failed with exit code {result.returncode}: {result.stderr}")
              if not expect_success and result.returncode == 0:
                  raise SystemExit(f"{' '.join(args)} unexpectedly succeeded")
              return result

          with tempfile.TemporaryDirectory(prefix="cairnid-distribution-") as root:
              evidence_dir = Path(root) / "release-evidence"
              run_cli("--version")
              run_cli("evidence", "--help")
              plan = json.loads(run_cli("evidence", "plan").stdout)
              manifest = json.loads(run_cli("evidence", "manifest").stdout)
              init = json.loads(run_cli("evidence", "init", str(evidence_dir)).stdout)
              status = json.loads(
                  run_cli("evidence", "status", str(evidence_dir), expect_success=False).stdout
              )
              check = json.loads(
                  run_cli("evidence", "check", str(evidence_dir), expect_success=False).stdout
              )

              if SENTINEL in "\n".join(outputs):
                  raise SystemExit("release CLI smoke output leaked sentinel")
              for path in evidence_dir.rglob("*"):
                  if path.is_file() and SENTINEL.encode() in path.read_bytes():
                      raise SystemExit(f"release evidence scaffold leaked sentinel in {path.name}")

          assert plan["status"] == "ready", plan
          assert plan["artifact_count"] == 24, plan
          assert plan["missing_environment"] == [], plan

          assert manifest["status"] == "ok", manifest
          assert manifest["artifact_count"] == 24, manifest

          assert init["status"] == "initialized", init
          assert init["artifact_count"] == 24, init
          assert init["files_written"] == [
              "release-evidence-manifest.json",
              "README.md",
              ".gitignore",
          ], init

          assert status["status"] == "incomplete", status
          assert status["artifact_count"] == 24, status
          assert status["missing_artifact_count"] == 24, status

          assert check["status"] == "incomplete", check
          assert len(check["artifacts"]) == 24, check
          assert check["failures"], check
      - name: Smoke release MCP stdio
        env:
          CLI_BINARY: ${{ matrix.cli_binary_path }}
          MCP_BINARY: ${{ matrix.mcp_binary_path }}
        shell: python
        run: |
          import json
          import os
          import queue
          import subprocess
          import tempfile
          import threading
          import time

          expected_tools = [
              "cairnid.evidence_check",
              "cairnid.evidence_manifest",
              "cairnid.evidence_plan",
              "cairnid.evidence_status",
          ]

          SENTINEL = "CAIRNID_DISTRIBUTION_SMOKE_SECRET_DO_NOT_EXPOSE"
          cli = os.path.abspath(os.environ["CLI_BINARY"])
          binary = os.path.abspath(os.environ["MCP_BINARY"])

          def assert_no_sentinel(label, *values):
              for value in values:
                  text = value if isinstance(value, str) else json.dumps(value, sort_keys=True)
                  if SENTINEL in text:
                      raise SystemExit(f"{label} leaked sentinel")

          def safe_stderr(stderr_lines):
              text = "".join(stderr_lines)
              if SENTINEL in text:
                  return "[redacted: sentinel appeared in stderr]"
              return text

          def initialize_evidence_dir(root):
              evidence_dir = os.path.join(root, "release-evidence")
              result = subprocess.run(
                  [cli, "evidence", "init", evidence_dir],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              assert_no_sentinel("release evidence init output", result.stdout, result.stderr)
              if result.returncode != 0:
                  raise SystemExit(
                      f"evidence init failed with exit code {result.returncode}: {result.stderr}"
                  )
              init = json.loads(result.stdout)
              assert init["status"] == "initialized", init
              return evidence_dir

          def assert_tools_list_output_schemas(tools):
              if not isinstance(tools, list):
                  raise SystemExit(f"MCP tools/list did not return a tools array: {tools}")
              advertised_names = set()
              for tool in tools:
                  if not isinstance(tool, dict):
                      raise SystemExit(f"MCP tools/list returned a non-object tool: {tool}")
                  name = tool.get("name")
                  advertised_names.add(name)
                  schema = tool.get("outputSchema")
                  if not isinstance(schema, dict):
                      raise SystemExit(f"MCP tool {name} omitted outputSchema: {tool}")
                  if schema.get("type") != "object":
                      raise SystemExit(f"MCP tool {name} outputSchema is not an object schema: {schema}")
                  variants = schema.get("oneOf")
                  if not isinstance(variants, list) or len(variants) != 2:
                      raise SystemExit(f"MCP tool {name} outputSchema should expose success and error variants: {schema}")
                  encoded_schema = json.dumps(schema, sort_keys=True)
                  if "schema_version" not in encoded_schema:
                      raise SystemExit(f"MCP tool {name} outputSchema omits schema_version: {schema}")
              for name in expected_tools:
                  if name not in advertised_names:
                      raise SystemExit(f"MCP tools/list omitted {name}: {tools}")

          with tempfile.TemporaryDirectory(prefix="cairnid-mcp-distribution-") as root:
              initialize_evidence_dir(root)
              process = subprocess.Popen(
                  [binary],
                  cwd=root,
                  env={**os.environ, "RUST_LOG": "off"},
                  stdin=subprocess.PIPE,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              responses = queue.Queue()
              observed_responses = []
              stdout_lines = []
              stderr_lines = []

              def read_stdout():
                  for line in process.stdout:
                      stdout_lines.append(line)
                      if line.strip():
                          responses.put(line)

              def read_stderr():
                  for line in process.stderr:
                      stderr_lines.append(line)

              threading.Thread(target=read_stdout, daemon=True).start()
              threading.Thread(target=read_stderr, daemon=True).start()

              def write(message):
                  if process.poll() is not None:
                      raise SystemExit(
                          f"MCP server exited before request; code={process.returncode}; "
                          f"stderr={safe_stderr(stderr_lines)}"
                      )
                  process.stdin.write(json.dumps(message) + "\n")
                  process.stdin.flush()

              def request(request_id, message):
                  write(message)
                  deadline = time.monotonic() + 10
                  while True:
                      remaining = deadline - time.monotonic()
                      if remaining <= 0:
                          raise SystemExit(
                              f"timed out waiting for MCP response {request_id}; stderr: {safe_stderr(stderr_lines)}"
                          )
                      try:
                          line = responses.get(timeout=remaining)
                      except queue.Empty:
                          raise SystemExit(
                              f"timed out waiting for MCP response {request_id}; stderr: {safe_stderr(stderr_lines)}"
                          ) from None
                      assert_no_sentinel("MCP stdout", line)
                      response = json.loads(line)
                      assert_no_sentinel(f"MCP response {request_id}", response)
                      observed_responses.append(response)
                      if response.get("id") != request_id:
                          raise SystemExit(
                              f"MCP response id mismatch for request {request_id}: {response}"
                          )
                      if "error" in response:
                          raise SystemExit(f"MCP response {request_id} returned error: {response}")
                      return response["result"]

              def call_tool(request_id, name, arguments):
                  return request(
                      request_id,
                      {
                          "jsonrpc": "2.0",
                          "id": request_id,
                          "method": "tools/call",
                          "params": {
                              "name": name,
                              "arguments": arguments,
                          },
                      },
                  )

              def structured(result, label):
                  content = result.get("structuredContent")
                  if not isinstance(content, dict):
                      raise SystemExit(f"{label} did not return structured content: {result}")
                  return content

              def assert_tool_success(result, label):
                  if result.get("isError") is not False:
                      raise SystemExit(f"{label} returned tool error: {result}")
                  return structured(result, label)

              def missing_evidence_count(summary):
                  failure_codes = summary.get("failure_codes")
                  if not isinstance(failure_codes, dict):
                      raise SystemExit(f"missing failure_codes in summary: {summary}")
                  count = failure_codes.get("missing_evidence")
                  if not isinstance(count, int) or count <= 0:
                      raise SystemExit(f"missing_evidence was not counted: {summary}")
                  return count

              try:
                  initialize = request(
                      1,
                      {
                          "jsonrpc": "2.0",
                          "id": 1,
                          "method": "initialize",
                          "params": {
                              "protocolVersion": "2025-11-25",
                              "capabilities": {},
                              "clientInfo": {
                                  "name": "cairnid-mcp-distribution-smoke",
                                  "version": "0.0.0",
                              },
                          },
                      },
                  )
                  assert initialize["serverInfo"]["name"] == "cairnid-mcp", initialize
                  assert isinstance(initialize["capabilities"]["tools"], dict), initialize
                  write({"jsonrpc": "2.0", "method": "notifications/initialized"})
                  tools = request(
                      2,
                      {
                          "jsonrpc": "2.0",
                          "id": 2,
                          "method": "tools/list",
                          "params": {},
                      },
                  )
                  names = sorted(tool["name"] for tool in tools["tools"])
                  assert names == expected_tools, names
                  assert_tools_list_output_schemas(tools["tools"])

                  plan = call_tool(3, "cairnid.evidence_plan", {})
                  plan_content = assert_tool_success(plan, "evidence_plan")
                  assert plan_content["schema_version"] == "cairnid.mcp.evidence.v1", plan_content
                  assert plan_content["status"] == "ready", plan_content

                  manifest = call_tool(4, "cairnid.evidence_manifest", {})
                  manifest_content = assert_tool_success(manifest, "evidence_manifest")
                  assert manifest_content["schema_version"] == "cairnid.mcp.evidence.v1", manifest_content
                  if not manifest_content.get("artifacts"):
                      raise SystemExit(f"evidence_manifest omitted artifacts: {manifest_content}")

                  status = call_tool(
                      5,
                      "cairnid.evidence_status",
                      {"evidence_dir": "release-evidence"},
                  )
                  status_content = assert_tool_success(status, "evidence_status")
                  assert status_content["schema_version"] == "cairnid.mcp.evidence.v1", status_content
                  assert status_content["status"] == "incomplete", status_content
                  missing_evidence_count(status_content)

                  check = call_tool(
                      6,
                      "cairnid.evidence_check",
                      {"evidence_dir": "release-evidence"},
                  )
                  if check.get("isError") is not True:
                      raise SystemExit(f"evidence_check unexpectedly succeeded: {check}")
                  check_content = structured(check, "evidence_check")
                  error = check_content.get("error")
                  if not isinstance(error, dict):
                      raise SystemExit(f"evidence_check missing structured error: {check}")
                  assert check_content["schema_version"] == "cairnid.mcp.evidence.v1", check_content
                  assert error["code"] == "release_evidence_incomplete", error
                  assert error["failure_code"] == "missing_evidence", error
                  assert error["summary"]["status"] == "incomplete", error
                  missing_evidence_count(error)

                  time.sleep(0.2)
                  extra_stdout = []
                  while True:
                      try:
                          extra_stdout.append(responses.get_nowait())
                      except queue.Empty:
                          break
                  if extra_stdout:
                      assert_no_sentinel("unexpected MCP stdout", extra_stdout)
                      raise SystemExit(f"MCP wrote unexpected stdout after tools/call: {extra_stdout}")
                  assert_no_sentinel(
                      "MCP stdio smoke",
                      "".join(stdout_lines),
                      "".join(stderr_lines),
                      observed_responses,
                  )
                  if stderr_lines:
                      raise SystemExit(f"MCP wrote stderr during stdio smoke: {safe_stderr(stderr_lines)}")
              finally:
                  if process.poll() is None:
                      process.kill()
                      process.wait(timeout=5)
      - name: Upload CI rehearsal CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cairnid-cli-ci-rehearsal-${{ matrix.artifact_os }}-${{ github.sha }}
          path: ${{ matrix.cli_binary_path }}
          if-no-files-found: error
      - name: Upload CI rehearsal MCP artifact
        uses: actions/upload-artifact@v7
        with:
          name: cairnid-mcp-ci-rehearsal-${{ matrix.artifact_os }}-${{ github.sha }}
          path: ${{ matrix.mcp_binary_path }}
          if-no-files-found: error

  dependency-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install native dependencies
        timeout-minutes: 35
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail

          apt_with_retry() {
            local description="$1"
            shift
            local status=0
            for attempt in 1 2 3; do
              echo "${description} (attempt ${attempt}/3)"
              if sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s 300s "$@"; then
                return 0
              fi
              status=$?
              if [ "$attempt" -eq 3 ]; then
                echo "${description} failed after 3 attempts"
                return "$status"
              fi
              sleep "$((attempt * 10))"
            done
          }

          apt_with_retry "apt-get update" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 update
          apt_with_retry "apt-get install" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 install -y --no-install-recommends cmake nasm pkg-config libssl-dev
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Install dependency security tools
        run: |
          cargo install cargo-deny --locked --version 0.19.8
          cargo install cargo-audit --locked --version 0.22.2
      - name: Cargo deny
        run: cargo deny check
      - name: Cargo audit
        run: cargo audit
      - name: Dependency policy evidence receipt
        run: |
          set -euo pipefail
          cargo run -p cairn-api --locked -- operations dependency-policy-evidence > dependency-policy-check.json
          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("dependency-policy-check.json").read_text()
          forbidden = ('"stdout"', '"stderr"', '"token"', '"secret"', '"password"')
          if any(value in raw.lower() for value in forbidden):
              raise SystemExit("dependency-policy evidence archived forbidden output fields")
          report = json.loads(raw)
          assert report["status"] == "ok", report
          assert report["workspace"]["cargo_lock_present"], report
          assert report["workspace"]["bun_lock_present"], report
          assert report["workspace"]["deny_toml_present"], report
          assert report["workspace"]["cargo_audit_config_present"], report
          assert report["workspace"]["dependency_docs_present"], report
          assert {check["name"] for check in report["checks"]} == {
              "cargo_deny",
              "cargo_audit",
              "bun_audit",
          }, report
          assert all(check["status"] == "passed" for check in report["checks"]), report
          PY

  postgres-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cairn
          POSTGRES_PASSWORD: cairn
          POSTGRES_DB: cairn_identity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cairn -d cairn_identity_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CAIRN_DATABASE_TEST_URL: postgres://cairn:cairn@localhost:5432/cairn_identity_test
    steps:
      - uses: actions/checkout@v6
      - name: Install native dependencies
        timeout-minutes: 35
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail

          apt_with_retry() {
            local description="$1"
            shift
            local status=0
            for attempt in 1 2 3; do
              echo "${description} (attempt ${attempt}/3)"
              if sudo env DEBIAN_FRONTEND=noninteractive timeout --kill-after=30s 300s "$@"; then
                return 0
              fi
              status=$?
              if [ "$attempt" -eq 3 ]; then
                echo "${description} failed after 3 attempts"
                return "$status"
              fi
              sleep "$((attempt * 10))"
            done
          }

          apt_with_retry "apt-get update" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 update
          apt_with_retry "apt-get install" apt-get -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 install -y --no-install-recommends cmake nasm pkg-config libssl-dev
      - name: Database integration tests
        run: cargo test -p cairn-database --tests --locked
      - name: OIDC public flow API integration test
        timeout-minutes: 15
        run: cargo test -p cairn-api oidc_public_flow --locked
      - name: Admin groups API integration test
        timeout-minutes: 15
        run: cargo test -p cairn-api admin_groups --locked

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Frontend dependency audit
        run: bun run audit
      - name: Public surface check
        run: bun run check:public-surface
      - name: Docs export check
        run: |
          docs_out="$(realpath -m --relative-to="$GITHUB_WORKSPACE" "$RUNNER_TEMP/site-docs-export-check")"
          bun run docs:site -- --out "$docs_out"
      - name: Check
        run: bun run check
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build
      - name: Install Playwright browser
        run: node apps/web/node_modules/@playwright/test/cli.js install --with-deps chromium
      - name: Browser smoke
        run: bun run test:e2e

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v6
      - name: Show Docker version
        run: docker version
      - name: Validate Compose file
        env:
          CAIRN_KEY_ENCRYPTION_KEY: ci-compose-placeholder
        run: docker compose -f infra/docker-compose.yml config --quiet
      - name: Build API image
        run: docker build --pull --file Dockerfile --tag cairn-api:ci .
      - name: Smoke API image
        run: docker run --rm --entrypoint /usr/local/bin/cairn-api cairn-api:ci signing-key generate-kek
      - name: Build web image
        run: docker build --pull --file apps/web/Dockerfile --tag cairn-web:ci .
      - name: Smoke web image
        run: docker run --rm --entrypoint bun cairn-web:ci --version
      - name: Smoke web health endpoint
        run: |
          docker run --rm -d --name cairn-web-health -e HOST=0.0.0.0 -e PORT=3000 cairn-web:ci
          trap 'docker rm -f cairn-web-health' EXIT
          for attempt in {1..30}; do
            if docker exec cairn-web-health bun scripts/healthcheck.ts; then
              exit 0
            fi
            sleep 1
          done
          docker logs cairn-web-health
          exit 1
