name: Bug report
description: Report a reproducible defect in Cairn Identity.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, bearer tokens, authorization codes, private keys, cookies, database URLs, or sensitive release evidence. Report vulnerabilities through SECURITY.md instead of this template.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands, routes, or UI steps where possible.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication/session
        - OIDC/OAuth
        - SCIM
        - MFA/passkeys
        - Admin UI
        - Deployment/operations
        - Audit/security logging
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-beta.1 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Bun version, Postgres version, deployment target.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Paste only logs with secrets removed.
      render: text
